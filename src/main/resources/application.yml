spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lpu
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

lpu:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 horas
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  ranking:
    tournaments-to-count: 10

management:
  endpoints:
    web:
      exposure:
        include: health
